name: Build/release Electron app

on:
  push:
    tags:
      - v*.*.*
  workflow_dispatch:

jobs:
  release:
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    strategy:
      matrix:
        os: [windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: build-win
        if: matrix.os == 'windows-latest'
        run: |
          npm run build
          node -e "const fs = require('fs'); const files = ['dist/index.js', 'dist/main/index.js']; const keys = ['NEXT_PUBLIC_SUPABASE_URL', 'NEXT_PUBLIC_SUPABASE_ANON_KEY', 'NEXT_PUBLIC_SUPABASE_TABLE_NAME', 'NEXT_PUBLIC_IGDB_CLIENT_ID', 'IGDB_CLIENT_SECRET']; files.forEach(f => { if (fs.existsSync(f)) { let content = fs.readFileSync(f, 'utf8'); keys.forEach(k => { const v = process.env[k]; if (v) { content = content.replace(new RegExp('process\\.env\\.' + k, 'g'), '\"' + v.replace(/\"/g, '\\\\\"') + '\"'); console.log('Injected ' + k + ' into ' + f); } }); fs.writeFileSync(f, content, 'utf8'); } });"
          npx electron-builder
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SUPABASE_TABLE_NAME: ${{ secrets.NEXT_PUBLIC_SUPABASE_TABLE_NAME }}
          NEXT_PUBLIC_IGDB_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
          GITHUB_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.ACCESS_TOKEN }}

      - name: release
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          token: ${{ secrets.ACCESS_TOKEN }}
          files: |
            release/*.exe
            release/*.zip
            release/*.yml
            release/*.blockmap
